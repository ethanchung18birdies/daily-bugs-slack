name: Recurring Bug Detection

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Optional pretend run date in YYYY-MM-DD format. Example: 2026-07-01 analyzes the 7 days ending June 30."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Use true to print the plan only; use false to write Issue Memory and post eligible Slack alerts."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  detect-recurring-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Write Google service account key
        shell: bash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_SECRET: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          key_json = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON_SECRET", "")
          if not key_json.strip():
              raise SystemExit("Missing GOOGLE_SERVICE_ACCOUNT_JSON secret")

          Path("service-account.json").write_text(key_json, encoding="utf-8")
          PY

      - name: Detect recurring issues
        shell: bash
        env:
          PRODUCT_FEEDBACK_SPREADSHEET_ID: 19JPqsVsE0hU-oBF5G02HdctrQBgTBudzQvFFyQHaj28
          ISSUE_MEMORY_SPREADSHEET_ID: ${{ secrets.ISSUE_MEMORY_SPREADSHEET_ID || '1pVU4K4E1TDdosF3XiPFxKhM8RYDS7iNOQWucNqQK7OQ' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ github.workspace }}/service-account.json
          PRODUCT_FEEDBACK_SLACK_WEBHOOK_URL: ${{ secrets.PRODUCT_FEEDBACK_SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          ROLLING_WINDOW_DAYS: ${{ vars.ROLLING_WINDOW_DAYS || '7' }}
          NEW_ISSUE_THRESHOLD: ${{ vars.NEW_ISSUE_THRESHOLD || '3' }}
          HIGH_IMPACT_THRESHOLD: ${{ vars.HIGH_IMPACT_THRESHOLD || '2' }}
          EXISTING_UPDATE_THRESHOLD: ${{ vars.EXISTING_UPDATE_THRESHOLD || '3' }}
          PATCHED_ALERT_THRESHOLD: ${{ vars.PATCHED_ALERT_THRESHOLD || '2' }}
          HIGH_IMPACT_TERMS: ${{ vars.HIGH_IMPACT_TERMS || '' }}
          LOG_LEVEL: INFO
          RUN_DATE: ${{ github.event.inputs.run_date || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          args=()

          if [[ -n "${RUN_DATE:-}" ]]; then
            if [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              args+=(--run-date "$RUN_DATE")
            else
              echo "Invalid run_date: '$RUN_DATE'. Expected YYYY-MM-DD."
              exit 1
            fi
          fi

          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            args+=(--dry-run)
          fi

          printf 'Running run_detection.py with args:'
          printf ' %q' "${args[@]}"
          printf '\n'

          python run_detection.py "${args[@]}"
