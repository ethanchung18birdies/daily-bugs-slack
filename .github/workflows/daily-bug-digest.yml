name: Daily CS Product Bug Digest

on:
  schedule:
    # GitHub cron is UTC-only. These two runs cover 8 AM Los Angeles time
    # during daylight saving time and standard time; the guard below skips
    # whichever run is not 8 AM PT.
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Optional pretend run date in YYYY-MM-DD format. Example: 2026-05-29 reports May 28."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Print the digest without posting to Slack."
        required: false
        default: false
        type: boolean

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check scheduled run time
        id: schedule_guard
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          event_name = os.environ["GITHUB_EVENT_NAME"]
          pt_now = datetime.now(ZoneInfo("America/Los_Angeles"))
          should_run = event_name == "workflow_dispatch" or pt_now.hour == 8

          print(f"should_run={str(should_run).lower()}")
          print(f"pt_time={pt_now.isoformat()}")
          PY

      - name: Write Google service account key
        if: steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_SECRET: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          key_json = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON_SECRET", "")
          if not key_json.strip():
              raise SystemExit("Missing GOOGLE_SERVICE_ACCOUNT_JSON secret")

          Path("service-account.json").write_text(key_json, encoding="utf-8")
          PY

      - name: Send daily digest
        if: steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        env:
          PRODUCT_FEEDBACK_SPREADSHEET_ID: 19JPqsVsE0hU-oBF5G02HdctrQBgTBudzQvFFyQHaj28
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ github.workspace }}/service-account.json
          PRODUCT_FEEDBACK_SLACK_WEBHOOK_URL: ${{ secrets.PRODUCT_FEEDBACK_SLACK_WEBHOOK_URL }}
          LOG_LEVEL: INFO
          RUN_DATE: ${{ inputs.run_date }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=()

          if [[ -n "${RUN_DATE:-}" ]]; then
            if [[ "$RUN_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              args+=(--run-date "$RUN_DATE")
            else
              echo "Invalid run_date: '$RUN_DATE'. Expected YYYY-MM-DD."
              exit 1
            fi
          fi

          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            args+=(--dry-run)
          fi

          printf 'Running daily_bug_digest.py with args:'
          printf ' %q' "${args[@]}"
          printf '\n'

          python daily_bug_digest.py "${args[@]}"
